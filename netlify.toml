[build]
  # Build command
  command = "cd bookbloom && npm run build"
  
  # Directory to publish (relative to repo root)
  publish = "bookbloom/.next"
  
  # Build environment variables
  [build.environment]
    NODE_VERSION = "18"

[functions]
  # Netlify Functions configuration if needed
  directory = "bookbloom/netlify/functions"

# Redirect rules for Next.js
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for better performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"